<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velvet and Blood – A City That Remembers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #16120f;
      --bg-panel:   #1e1914;
      --text:       #ddd5c8;
      --text-dim:   #8a7f75;
      --accent:     #c49a5a;
      --accent-dim: #7a5e35;
      --border:     #2e2820;
      --font-body:  Georgia, 'Times New Roman', serif;
      --font-ui:    system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 18px;
      line-height: 1.75;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    #story-output {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem 0 1rem;
      scroll-behavior: smooth;
    }

    /* Hide scrollbar but keep functionality */
    #story-output::-webkit-scrollbar { width: 4px; }
    #story-output::-webkit-scrollbar-track { background: transparent; }
    #story-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .story-paragraph {
      margin-bottom: 1.2em;
      opacity: 0;
      transform: translateY(4px);
      animation: fadein 0.35s ease forwards;
    }

    @keyframes fadein {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Inner voice lines */
    .voice-line {
      color: var(--text-dim);
      font-style: italic;
      font-size: 0.93em;
      border-left: 2px solid var(--accent-dim);
      padding-left: 0.85em;
      margin: 0.6em 0;
    }

    .voice-label {
      color: var(--accent);
      font-style: normal;
      font-size: 0.82em;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-right: 0.4em;
    }

    /* Clue discovery */
    .clue-found {
      display: inline-block;
      background: var(--bg-panel);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-ui);
      font-size: 0.72em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.15em 0.55em;
      border-radius: 2px;
      margin-left: 0.4em;
      vertical-align: middle;
      opacity: 0.85;
    }

    /* Companion observation lines — distinct from inner voices */
    .companion-line {
      color: #b8c4b8;
      font-style: italic;
      font-size: 0.93em;
      border-left: 2px solid #4a6b4a;
      padding-left: 0.85em;
      margin: 0.6em 0;
    }

    .companion-label {
      color: #7aab7a;
      font-style: normal;
      font-size: 0.82em;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-right: 0.4em;
    }

    /* Companion status notification — small, peripheral */
    .companion-status {
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.75em;
      letter-spacing: 0.05em;
      text-align: center;
      opacity: 0.6;
      margin: 1em 0 0.5em;
    }

    /* Section divider */
    .story-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5em 0;
    }

    /* Choices */
    #choices-container {
      padding: 1.2rem 0 2rem;
      border-top: 1px solid var(--border);
    }

    #choices-container.hidden { display: none; }

    .choice-btn {
      display: block;
      width: 100%;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-size: 0.95em;
      text-align: left;
      padding: 0.5em 0.8em;
      margin: 0.2em 0;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .choice-btn:hover, .choice-btn:focus {
      color: var(--text);
      border-left-color: var(--accent);
      outline: none;
    }

    /* Title screen */
    #title-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      gap: 1.5rem;
    }

    #title-screen h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    #title-screen .subtitle {
      font-size: 0.9rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #start-btn {
      background: none;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 0.6em 2em;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 1rem;
    }

    #start-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    #loading { color: var(--text-dim); font-family: var(--font-ui); font-size: 0.85rem; }

    /* End screen */
    #end-screen {
      display: none;
      padding: 2rem 0;
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.85rem;
    }

    /* Journal toggle button — appears once first clue is found */
    #journal-toolbar {
      display: none;
      text-align: right;
      padding: 0.4rem 0 0.1rem;
    }

    #journal-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.72em;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.2em 0;
      transition: color 0.15s;
    }

    #journal-btn:hover { color: var(--accent); }

    #journal-count {
      color: var(--accent-dim);
      font-variant-numeric: tabular-nums;
    }

    /* Journal overlay */
    #journal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(22, 18, 15, 0.82);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    #journal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    #journal-panel {
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      width: 100%;
      max-width: 720px;
      padding: 1.5rem 1.5rem 2rem;
      max-height: 60vh;
      overflow-y: auto;
      transform: translateY(12px);
      transition: transform 0.2s ease;
    }

    #journal-overlay.open #journal-panel {
      transform: translateY(0);
    }

    #journal-title {
      font-family: var(--font-ui);
      font-size: 0.7em;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    #journal-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    #journal-list li {
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.85em;
      padding: 0.4em 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.6em;
      align-items: baseline;
    }

    #journal-list li::before {
      content: '◆';
      color: var(--accent-dim);
      font-size: 0.6em;
      flex-shrink: 0;
      position: relative;
      top: -0.05em;
    }

    #journal-close {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-ui);
      font-size: 0.72em;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.6em;
      cursor: pointer;
      margin-top: 1.2rem;
      transition: border-color 0.15s, color 0.15s;
    }

    #journal-close:hover { border-color: var(--accent-dim); color: var(--text); }
  </style>
</head>
<body>

<div id="app">

  <div id="title-screen">
    <div>
      <h1>Velvet and Blood</h1>
      <p class="subtitle">A City That Remembers &nbsp;·&nbsp; Aurelstein, 1903</p>
    </div>
    <div id="loading">Lade Geschichte…</div>
    <button id="start-btn" style="display:none">Beginnen</button>
  </div>

  <div id="story-output" style="display:none"></div>
  <div id="journal-toolbar"><button id="journal-btn">Hinweise &thinsp;<span id="journal-count">0</span></button></div>
  <div id="choices-container" class="hidden"></div>
  <div id="end-screen">— Ende des ersten Akts —</div>

</div>

<div id="journal-overlay">
  <div id="journal-panel">
    <div id="journal-title">Gefundene Hinweise</div>
    <ul id="journal-list"></ul>
    <button id="journal-close">Schließen</button>
  </div>
</div>

<!-- inkjs is bundled by Vite from node_modules -->
<script type="module" src="./story.ts"></script>

</body>
</html>
